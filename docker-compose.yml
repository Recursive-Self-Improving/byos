services:
  byoo:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${BYOO_VERSION:?BYOO_VERSION is required}
        COMMIT: ${BYOO_COMMIT:?BYOO_COMMIT is required}
        BUILD_DATE: ${BYOO_BUILD_DATE:?BYOO_BUILD_DATE is required}
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      BYOO_MASTER_KEY: ${BYOO_MASTER_KEY}
      BYOO_ADMIN_PASSWORD: ${BYOO_ADMIN_PASSWORD}
      BYOO_ADMIN_API_KEY: ${BYOO_ADMIN_API_KEY}
    volumes:
      - byoo-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  byoo-data:
