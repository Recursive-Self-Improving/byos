services:
  byos:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${BYOS_VERSION:?BYOS_VERSION is required}
        COMMIT: ${BYOS_COMMIT:?BYOS_COMMIT is required}
        BUILD_DATE: ${BYOS_BUILD_DATE:?BYOS_BUILD_DATE is required}
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      BYOS_MASTER_KEY: ${BYOS_MASTER_KEY}
      BYOS_ADMIN_PASSWORD: ${BYOS_ADMIN_PASSWORD}
      BYOS_ADMIN_API_KEY: ${BYOS_ADMIN_API_KEY}
    volumes:
      - byos-data:/data
      - ./deploy/compose.yaml:/etc/byos/compose.yaml:ro
    command: ["byos", "serve", "--config", "/etc/byos/compose.yaml", "--listen", "0.0.0.0:8080", "--data-dir", "/data"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  byos-data:
